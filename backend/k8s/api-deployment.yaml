# File: k8s/api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskqueue-api
  namespace: taskqueue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: taskqueue-api
  template:
    metadata:
      labels:
        app: taskqueue-api
    spec:
      containers:
      - name: api
        image: taskqueue-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: taskqueue-config
              key: REDIS_ADDR
        - name: POSTGRES_DSN
          value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?sslmode=disable"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: taskqueue-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taskqueue-secrets
              key: POSTGRES_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: taskqueue-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
apiVersion: v1
kind: Service
metadata:
  name: taskqueue-api-service
  namespace: taskqueue
spec:
  selector:
    app: taskqueue-api
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
